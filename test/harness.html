// float16 エンコーダ (src/lib/float16.ts と同等)
function f32ToF16Bits(value) {
  const f32 = new Float32Array(1), i32 = new Int32Array(f32.buffer);
  f32[0] = value; const x = i32[0];
  const sign = (x >>> 16) & 0x8000;
  let exp = ((x >>> 23) & 0xff) - 127 + 15;
  let mant = x & 0x7fffff;
  if (exp <= 0) { if (exp < -10) return sign; mant = (mant | 0x800000) >> (1 - exp); return sign | (mant >> 13); }
  if (exp >= 0x1f) return sign | 0x7c00;
  return sign | (exp << 10) | (mant >> 13);
}
function encodeEmbedding(vec) {
  const u16 = new Uint16Array(vec.length);
  for (let i = 0; i < vec.length; i++) u16[i] = f32ToF16Bits(vec[i]);
  const bytes = new Uint8Array(u16.buffer);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function rng(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// 設定の読み取り (bundle と同じ localStorage キー)
function ls(k, d) { try { return localStorage.getItem(k) ?? d; } catch { return d; } }
function isClaudeMode() {
  return ls('tadori:developer-mode','') === '1'
      && ls('spira:ai:provider','') === 'claude'
      && !!ls('tadori:voyage:key','');
}
function dims() { return Number(ls('tadori:dimensions','256')) || 256; }

function jsonResponse(obj, status = 200) {

const realFetch = window.fetch.bind(window);

// 実 Voyage でドキュメント埋め込み
async function voyageEmbedDocs(texts) {
  const res = await realFetch('https://api.voyageai.com/v1/embeddings', {
    method:'POST',
    headers:{ Authorization:`Bearer ${ls('tadori:voyage:key','')}`, 'content-type':'application/json' },
    body: JSON.stringify({ input: texts, model: ls('tadori:voyage:model','voyage-3.5-lite'), input_type:'document', output_dimension: dims() }),
  });
  if (!res.ok) throw new Error('voyage docs HTTP ' + res.status + ' ' + (await res.text()).slice(0,200));
  const j = await res.json();
  const out = new Array(texts.length);
  j.data.forEach(d => { out[d.index] = d.embedding; });
  return out;
}

// List アイテムを構築 (claude モードは実 Voyage、それ以外は乱数)。キャッシュあり。
let listCache = null, listCacheKey = '';
async function buildListItems() {
  const claude = isClaudeMode();
  const key = claude ? ('voyage:' + ls('tadori:voyage:model','') + ':' + dims()) : 'random';
  if (listCache && listCacheKey === key) return listCache;

  let vecs;
  if (claude) {
    vecs = await voyageEmbedDocs(MAILS.map(m => m.Body));
  } else {
    const D = dims();
    vecs = MAILS.map((_, i) => { const r = rng(1000 + i), v = new Array(D); for (let j=0;j<D;j++) v[j]=r()*2-1; return v; });
  }
  listCache = MAILS.map((m, i) => ({
    Id:m.Id, Title:m.Title, From:m.From, Created:m.Created, Body:m.Body,
    embedding: encodeEmbedding(vecs[i]),
  }));
  listCacheKey = key;
  return listCache;
}

// 社内AI(モック)用の固定回答 SSE
function sseResponse(fullText) {
  const chunks = fullText.match(/.{1,8}/gs) || [];
  const enc = new TextEncoder(); let i = 0;
  const stream = new ReadableStream({
    pull(c) {
      if (i < chunks.length) c.enqueue(enc.encode(`data: ${JSON.stringify({choices:[{delta:{content:chunks[i++]}}]})}\n\n`));
      else { c.enqueue(enc.encode('data: [DONE]\n\n')); c.close(); }
    },
  });
  return new Response(stream, { status:200, headers:{ 'Content-Type':'text/event-stream' } });
}

function pickMockAnswer(reqBody) {
  try {
    const b = JSON.parse(reqBody || '{}');
    const msgs = Array.isArray(b.messages) ? b.messages : [];
    const lastUser = [...msgs].reverse().find(m => m && m.role === 'user');
    const content = String((lastUser && lastUser.content) || '');
    // user prompt のテンプレは "...質問: <ユーザ入力>" で終わる。それ以降だけを意図検出。
    const m = content.match(/質問:\s*([\s\S]+)$/);
    const q = m ? m[1] : content;
    if (/OneNote|ノートに|メモして|議事録|ナレッジ|FAQ/i.test(q)) return MOCK_ANSWER_WITH_APPEND;
  } catch {}
  return MOCK_ANSWER;
}

    const id = new URL(u, location.origin).searchParams.get('id');
    console.log('[harness] outlook/open id=', id);
    return jsonResponse({ ok: true, found: true });
  }
  // OneNote 階層 (relay) をモック
  if (u.includes('/tadori/onenote/hierarchy')) {
    await new Promise(r => setTimeout(r, 120));
    return jsonResponse({ ok: true, notebooks: [
      { id: 'nb1', name: '業務メモ', sections: [
        { id: 's1', name: '会議録', pages: [
          { id: 'p101', name: '2026Q1 キックオフ', lastModified: '2026-02-15T10:00:00Z' },
          { id: 'p102', name: 'A プロジェクト 進捗確認', lastModified: '2026-04-10T11:30:00Z' },
        ]},
        { id: 's2', name: '個人ノート', pages: [
          { id: 'p103', name: 'リサーチメモ', lastModified: '2026-05-01T09:00:00Z' },
        ]},
      ]},
      { id: 'nb2', name: 'ナレッジ', sections: [
        { id: 's3', name: '手順書', pages: [
          { id: 'p201', name: 'OneNote 取り込み手順', lastModified: '2026-05-20T15:00:00Z' },
        ]},

    ]});
  }
  // OneNote ページ本文 (relay) をモック
  if (u.includes('/tadori/onenote/pages')) {
    await new Promise(r => setTimeout(r, 200));
    const params = new URL(u, location.origin).searchParams;
    const ids = (params.get('ids') || '').split(';').filter(Boolean);
    const SAMPLE = {
      p101: { title: '2026Q1 キックオフ', notebook: '業務メモ', section: '会議録',

      p102: { title: 'A プロジェクト 進捗確認', notebook: '業務メモ', section: '会議録',
        body: '# A プロジェクト 進捗\n\n機能開発はほぼ予定通り。\n\n## 課題\n- データ移行のリハーサル未実施\n- 受入テストの体制が固まっていない\n\n来週までに体制を確定する。' },
      p103: { title: 'リサーチメモ', notebook: '業務メモ', section: '個人ノート',
        body: '## 競合調査\nCopilot / Glean / Notion AI などのプロダクトは社内文書のベクトル化 + 出典付き回答が中核。\n\n社内ローカルで実現するには、ベクトル DB + 埋め込みモデルの選定が要となる。' },

  if (u.includes('/tadori/onenote/open')) {

  if (u.includes('GetFolderByServerRelativeUrl') && u.includes('Exists')) return jsonResponse({ Exists: false }); // ensureFolder 存在確認
  if (u.includes('/_api/web/folders')) return jsonResponse({ ok: true }); // ensureFolder 作成 (addUsingPath / 直接POST 両対応)
  if (u.includes('GetFolderByServerRelativeUrl') && u.includes('/Files/add')) {

    const name = m ? decodeURIComponent(m[1]) : null;

  }
  if (u.includes('GetFolderByServerRelativeUrl') && u.includes('/Files?')) {
    const value = Object.keys(window.__spFiles).filter(n => n.startsWith('seg-')).map(Name => ({ Name }));
    return jsonResponse({ value });
  }
  if (u.includes('GetFileByServerRelativeUrl')) {
    const m = u.match(/GetFileByServerRelativeUrl\('([^']+)'\)/);
    const name = m ? decodeURIComponent(m[1]).split('/').pop() : null;
    if (name && window.__spFiles[name] != null) {
      return new Response(window.__spFiles[name], { status: 200, headers: { 'Content-Type': 'application/json' } });
    }
    return new Response('', { status: 404 });
  }

  // 利用料リスト (Tadori 利用料) — ステートフルなモック (集計表示の検証用)
  const decoded = decodeURIComponent(u);
  if (decoded.includes("getbytitle('Tadori 利用料')")) {
    if (!window.__usageRows) {
      const m = new Date().getFullYear() + '-' + String(new Date().getMonth()+1).padStart(2,'0');
      window.__usageRows = [
        { Id: 1, Title: m+'|tanaka@example.co.jp', Month: m, TadoriUser: 'tanaka@example.co.jp', Yen: 312.5, Tokens: 18200 },
        { Id: 2, Title: m+'|sato@example.co.jp',   Month: m, TadoriUser: 'sato@example.co.jp',   Yen: 88.0,  Tokens: 5100 },
      ];
      window.__usageNextId = 3;
    }
    const method = (opts && opts.method || 'GET').toUpperCase();
    const isItems = /\/items(\(|\?|$)/.test(decoded);
    const idM = decoded.match(/\/items\((\d+)\)/);
    if (idM && method === 'POST') { // MERGE 更新
      const id = Number(idM[1]); const row = window.__usageRows.find(r => r.Id === id);
      if (row) Object.assign(row, JSON.parse(opts.body || '{}'));
      return new Response('', { status: 204 });
    }
    if (isItems && method === 'POST') { // 作成
      const row = Object.assign({ Id: window.__usageNextId++ }, JSON.parse(opts.body || '{}'));
      window.__usageRows.push(row);
      return jsonResponse({ Id: row.Id });
    }
    if (isItems && method === 'GET') { // フィルタ取得
      let rows = window.__usageRows;
      const fT = decoded.match(/Title eq '([^']*)'/);
      const fM = decoded.match(/Month eq '([^']*)'/);
      if (fT) rows = rows.filter(r => r.Title === fT[1]);
      else if (fM) rows = rows.filter(r => r.Month === fM[1]);
      return jsonResponse({ value: rows });
