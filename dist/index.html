#tadori-root[data-theme="dark"]{
  --ink:#e8e4d8; --ink-3:#a8a39a; --ink-4:#7a766c;
  --paper:#1d1b18; --paper-2:#25231f; --paper-2-strong:#2c2a25; --paper-3:#3a3731;
  --line:rgba(232,228,216,.14); --line-strong:rgba(232,228,216,.22);
}
#tadori-root *{box-sizing:border-box;}
#tadori-root svg{display:block;}

#tadori-root .tdr-topbar{display:flex;align-items:center;gap:var(--s-4);height:var(--topbar-h);
  padding:0 var(--gutter);border-bottom:1px solid var(--line);background:var(--paper);flex:0 0 auto;}
#tadori-root .tdr-brand{display:flex;align-items:baseline;gap:var(--s-3);min-width:0;overflow:hidden;}
#tadori-root .tdr-brand .mark{font-family:var(--font-mono);color:var(--accent-strong);font-size:var(--fs-xl);font-weight:600;line-height:1;}
#tadori-root .tdr-brand .name{font-size:var(--fs-lg);font-weight:600;color:var(--ink);line-height:1;}
#tadori-root .tdr-brand .sub{font-size:var(--fs-xs);color:var(--ink-3);font-weight:400;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tadori-root .tdr-spacer{flex:1;}
#tadori-root .tdr-user{display:inline-flex;align-items:center;gap:var(--s-3);padding:2px 10px 2px 3px;border-radius:999px;background:var(--paper-2);color:var(--ink);font-size:var(--fs-sm);max-width:200px;}
#tadori-root .tdr-user-avatar{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-weight:600;font-size:12px;flex-shrink:0;}
#tadori-root .tdr-user-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tadori-root .tdr-presence{display:flex;align-items:center;gap:var(--s-2);padding:4px 10px;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-2);font-size:var(--fs-xs);color:var(--ink-3);cursor:default;white-space:nowrap;}
#tadori-root .tdr-site-chip{display:inline-flex;align-items:center;gap:var(--s-2);padding:3px 10px;background:var(--paper-2);border:1px solid var(--line);border-radius:99px;font-size:var(--fs-xs);color:var(--ink-3);cursor:default;white-space:nowrap;max-width:200px;}
#tadori-root .tdr-site-chip .name{overflow:hidden;text-overflow:ellipsis;}
#tadori-root .tdr-site-chip .ic{display:inline-flex;color:var(--ink-4);flex-shrink:0;}
#tadori-root .tdr-presence .ic{font-size:12px;line-height:1;}
#tadori-root .tdr-presence .cnt{font-weight:600;color:var(--ink);}
#tadori-root .tdr-presence .sep{color:var(--ink-4);}
#tadori-root .tdr-presence .writer.is-me{color:var(--accent-strong);font-weight:600;}

/* \u30EC\u30A4\u30A2\u30A6\u30C8: \u5DE6\u30DA\u30A4\u30F3 | \u4ED5\u5207\u308A | \u30C1\u30E3\u30C3\u30C8 */
#tadori-root .tdr-main{display:flex;flex:1;min-height:0;}
#tadori-root .tdr-chat{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;}
#tadori-root .tdr-sidebar{flex:0 0 auto;display:flex;flex-direction:column;min-height:0;
  background:var(--paper-2);border-right:1px solid var(--line);overflow:hidden;}
#tadori-root .tdr-sidebar-head{display:flex;align-items:stretch;gap:var(--s-3);margin:var(--s-5);}
#tadori-root .tdr-sidebar-head .tdr-new-session{flex:1;margin:0;}
#tadori-root .tdr-new-session{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:var(--s-3);
  margin:var(--s-5);padding:var(--s-4) var(--s-5);font:inherit;font-size:var(--fs-md);font-weight:600;color:#fff;
  background:var(--accent);border:1px solid var(--accent);border-radius:var(--r-3);cursor:pointer;}

/* \u8A2D\u5B9A\u30CF\u30D6\u7528: \u56FA\u5B9A\u30B5\u30A4\u30BA + Spira \u3068\u540C\u3058\u7BB1\u30E2\u30C7\u30EB (modal \u306B\u4F59\u767D\u3001header/footer \u306F
   margin\u3001\u4E2D\u8EAB\u306E\u30CF\u30D6\u306F\u89D2\u4E38\u3067\u5185\u5074\u306B\u30A4\u30F3\u30BB\u30C3\u30C8)\u3002 */
#tadori-root .tdr-modal--lg{max-width:none;width:min(900px, calc(100vw - var(--s-10)));height:min(660px, calc(100vh - var(--s-10)));min-width:640px;min-height:460px;resize:both;padding:var(--s-5);}

#tadori-root .tdr-modal--lg .tdr-modal-footer{padding:0;margin-top:var(--s-7);}
/* OneNote \u8FFD\u8A18\u7528 (xlarge): lg \u3088\u308A\u5E83\u304F + body \u5185\u30B9\u30AF\u30ED\u30FC\u30EB + footer \u5E38\u6642\u8868\u793A */
#tadori-root .tdr-modal--xl{max-width:none;width:min(1280px, calc(100vw - var(--s-7)));height:min(860px, calc(100vh - var(--s-7)));min-width:720px;min-height:520px;resize:both;padding:var(--s-5);}
#tadori-root .tdr-modal--xl .tdr-modal-header{padding:0;margin-bottom:var(--s-4);flex-shrink:0;}

#tadori-root .tdr-modal-header{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-7) var(--s-7) var(--s-5);}
#tadori-root .tdr-modal-title{font-size:var(--fs-lg);font-weight:600;margin:0;}
#tadori-root .tdr-modal-footer{display:flex;justify-content:flex-end;gap:var(--s-3);padding:var(--s-5) var(--s-7) var(--s-7);}
#tadori-root .tdr-modal-body{padding:0 var(--s-7) var(--s-3);font-size:var(--fs-base);color:var(--ink);}

/* \u30C1\u30E3\u30C3\u30C8\u5C65\u6B74\u691C\u7D22\u30E2\u30FC\u30C0\u30EB (Spira \u306E\u30C1\u30B1\u30C3\u30C8\u691C\u7D22\u3092\u8E0F\u8972) */
#tadori-root .tdr-search-backdrop{align-items:flex-start;padding-top:10vh;}
#tadori-root .tdr-search-modal{width:720px;max-width:92vw;max-height:75vh;display:flex;flex-direction:column;padding:0;overflow:hidden;}
#tadori-root .tdr-search-head{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-4) var(--s-5);border-bottom:1px solid var(--line);}
#tadori-root .tdr-search-icon{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;color:var(--ink-3);flex-shrink:0;}
#tadori-root .tdr-search-input{flex:1;min-width:0;font-size:var(--fs-xl);font-weight:500;border:none;outline:none;background:transparent;color:var(--ink);padding:4px 0;font-family:inherit;}
#tadori-root .tdr-search-input::placeholder{color:var(--ink-4);font-weight:400;}
#tadori-root .tdr-search-close{flex-shrink:0;}
#tadori-root .tdr-search-body{flex:1;overflow-y:auto;padding:var(--s-3) var(--s-5);}
#tadori-root .tdr-search-foot{padding:var(--s-2) var(--s-5);border-top:1px solid var(--line);color:var(--ink-3);font-size:var(--fs-xs);min-height:28px;display:flex;align-items:center;}
#tadori-root .tdr-search-summary{flex:1;}
#tadori-root .tdr-search-hint{padding:var(--s-7) var(--s-5);text-align:center;color:var(--ink-3);}
#tadori-root .tdr-search-hint-title{font-size:var(--fs-base);color:var(--ink);font-weight:600;margin-bottom:var(--s-2);}
#tadori-root .tdr-search-hint-desc{font-size:var(--fs-sm);color:var(--ink-3);white-space:pre-line;}
#tadori-root .tdr-search-results{display:flex;flex-direction:column;gap:var(--s-3);padding:var(--s-2) 0;}
#tadori-root .tdr-search-result{padding:var(--s-4) var(--s-5);border:1px solid var(--line);border-radius:var(--r-3);background:var(--paper);cursor:pointer;}
#tadori-root .tdr-search-result:hover{background:var(--paper-2);border-color:var(--line-strong);}
#tadori-root .tdr-search-result-title{font-size:var(--fs-base);font-weight:600;color:var(--ink);}
#tadori-root .tdr-search-result-snippet{font-size:var(--fs-sm);color:var(--ink-3);margin-top:var(--s-2);line-height:1.5;}
#tadori-root .tdr-search-result-meta{font-size:var(--fs-xs);color:var(--ink-4);margin-top:var(--s-2);font-family:var(--font-mono);}
#tadori-root .tdr-search-result mark,#tadori-root .tdr-search-result-snippet mark{background:var(--hl);color:inherit;border-radius:2px;padding:0 1px;}

/* \u8A2D\u5B9A\u30CF\u30D6: \u5DE6\u30CA\u30D3 + \u53F3\u30DA\u30A4\u30F3 (Spira \u306E\u8A2D\u5B9A\u30CF\u30D6\u3068\u540C\u3058\u4F5C\u308A) */
#tadori-root .tdr-hub{display:flex;flex:1;min-height:0;border:1px solid var(--line);border-radius:var(--r-2);overflow:hidden;}
#tadori-root .tdr-hub-nav{width:220px;flex:0 0 auto;border-right:1px solid var(--line);background:var(--paper-2);padding:var(--s-2) 0;overflow-y:auto;}
#tadori-root .tdr-hub-group{padding:var(--s-3) var(--s-4) var(--s-1);font-size:var(--fs-xs);color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}

#tadori-root .tdr-hub-navitem:hover{background:var(--paper-2-strong);color:var(--ink);}
#tadori-root .tdr-hub-navitem.is-active{background:var(--accent-soft);color:var(--ink);border-left-color:var(--accent);font-weight:600;}
/* Spira \u6D41\u306E\u30AB\u30FC\u30C9\u578B\u30E9\u30B8\u30AA (\u6587\u5B57\u30B5\u30A4\u30BA / \u9001\u4FE1\u30AD\u30FC \u306A\u3069) */
#tadori-root .tdr-radio-card{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-4) var(--s-5);background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-2);margin-top:var(--s-2);cursor:pointer;}
#tadori-root .tdr-radio-card:hover{border-color:var(--line-strong);background:var(--paper-2-strong);}
#tadori-root .tdr-radio-card.is-checked{border-color:var(--accent);background:var(--accent-soft);}
#tadori-root .tdr-radio-card-title{font-size:var(--fs-md);color:var(--ink);font-weight:600;}
#tadori-root .tdr-radio-card-desc{font-size:var(--fs-xs);color:var(--ink-3);margin-top:2px;}
#tadori-root .tdr-hub-group.is-danger{color:var(--danger);}
#tadori-root .tdr-hub-navitem.is-danger{color:var(--danger);}
#tadori-root .tdr-hub-navitem.is-danger.is-active{background:var(--danger-soft);color:var(--danger);border-left-color:var(--danger);}
#tadori-root .tdr-hub-pane{flex:1;min-width:0;padding:var(--s-5) var(--s-6);overflow:auto;background:var(--paper);}
/* \u6B6F\u8ECA\u30C9\u30ED\u30C3\u30D7\u30C0\u30A6\u30F3\u30E1\u30CB\u30E5\u30FC (Spira \u3068\u540C\u3058) */

#tadori-root .tdr-menu-item:hover{background:var(--paper-2);}
#tadori-root .tdr-menu-divider{height:1px;background:var(--line);margin:var(--s-1) var(--s-2);}
#tadori-root .tdr-pane-title{font-size:var(--fs-lg);font-weight:600;color:var(--ink);margin:0 0 var(--s-3);}

#tadori-root .tdr-fieldgrid{display:grid;grid-template-columns:130px minmax(0,1fr);gap:var(--s-3) var(--s-4);align-items:center;}

#tadori-root .tdr-fieldgrid > label.top{align-self:start;padding-top:8px;}
#tadori-root .tdr-label{display:block;font-size:var(--fs-sm);color:var(--ink-3);margin-bottom:var(--s-2);font-weight:600;}
#tadori-root .tdr-input{width:100%;height:32px;padding:0 10px;font-size:var(--fs-md);font-family:inherit;color:var(--ink);background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-2);outline:none;}

#tadori-root select.tdr-input{height:32px;}
#tadori-root .tdr-hint{grid-column:2;font-size:var(--fs-xs);color:var(--ink-3);line-height:1.6;margin:0;}
#tadori-root .tdr-shared-note{grid-column:1 / -1;font-size:var(--fs-xs);color:var(--ink-3);background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-2);padding:var(--s-3) var(--s-4);line-height:1.6;}

#tadori-root .tdr-diag{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-3) 0;border-bottom:1px solid var(--line);font-size:var(--fs-md);}

#tadori-root .tdr-diag .ok{color:var(--ok);} #tadori-root .tdr-diag .ng{color:var(--danger);}
