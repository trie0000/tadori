  --accent:#7a8a78; --accent-soft:rgba(122,138,120,.18); --accent-strong:#5e6f5c;
  --danger:#b8534a; --danger-soft:rgba(184,83,74,.12); --warn:#c47f1c; --ok:#2f6f5e; --ok-soft:rgba(47,111,94,.12);
  --hl:rgba(196,174,96,.45);
  --font-sans:"Meiryo","\u30E1\u30A4\u30EA\u30AA","Hiragino Sans","Yu Gothic UI",-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-mono:ui-monospace,"Cascadia Mono","Consolas",monospace;
  --fs-xs:11px; --fs-sm:12px; --fs-md:13px; --fs-base:15px; --fs-lg:16px; --fs-xl:18px;
  --lh-base:1.75;
  --s-1:4px; --s-2:6px; --s-3:8px; --s-4:10px; --s-5:12px; --s-6:14px; --s-7:18px; --s-8:22px; --s-9:28px; --s-10:40px;
  --r-1:2px; --r-2:4px; --r-3:6px; --r-4:8px;
  --shadow-modal:0 0 0 1px rgba(42,42,38,.06),0 4px 12px rgba(42,42,38,.10),0 16px 40px rgba(42,42,38,.18);
  --topbar-h:44px; --gutter:24px; --thread-w:760px;
  --z-overlay:2147483600; --z-modal:2147483700; --z-toast:2147483800;
  font-family:var(--font-sans); font-size:var(--fs-base); line-height:var(--lh-base); color:var(--ink);
  position:fixed; inset:0; z-index:2147483600; display:flex; flex-direction:column; background:var(--paper);
  /* all:initial \u304C user-select \u3092 auto \u306B\u623B\u3059\u305F\u3081\u3001\u753B\u9762\u5168\u4F53\u3092\u660E\u793A\u7684\u306B\u9078\u629E\u53EF\u80FD\u306B\u3059\u308B
     (\u56DE\u7B54\u30FB\u51FA\u5178\u30FB\u30A8\u30E9\u30FC\u306A\u3069\u3069\u3053\u3067\u3082\u30DE\u30A6\u30B9\u30C9\u30E9\u30C3\u30B0\u3067\u30B3\u30D4\u30FC\u3067\u304D\u308B\u3088\u3046\u306B)\u3002 */
  user-select:text; -webkit-user-select:text;
}
#tadori-root[data-theme="dark"]{
  --ink:#e8e4d8; --ink-3:#a8a39a; --ink-4:#7a766c;
  --paper:#1d1b18; --paper-2:#25231f; --paper-2-strong:#2c2a25; --paper-3:#3a3731;
  --line:rgba(232,228,216,.14); --line-strong:rgba(232,228,216,.22);
}
#tadori-root *{box-sizing:border-box;}
#tadori-root svg{display:block;}

#tadori-root .tdr-topbar{display:flex;align-items:center;gap:var(--s-4);height:var(--topbar-h);
  padding:0 var(--gutter);border-bottom:1px solid var(--line);background:var(--paper);flex:0 0 auto;}
#tadori-root .tdr-brand{display:flex;align-items:baseline;gap:var(--s-3);min-width:0;overflow:hidden;}
#tadori-root .tdr-brand .mark{font-family:var(--font-mono);color:var(--accent-strong);font-size:var(--fs-xl);font-weight:600;line-height:1;}
#tadori-root .tdr-brand .name{font-size:var(--fs-lg);font-weight:600;color:var(--ink);line-height:1;}
#tadori-root .tdr-brand .sub{font-size:var(--fs-xs);color:var(--ink-3);font-weight:400;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tadori-root .tdr-spacer{flex:1;}
#tadori-root .tdr-user{display:inline-flex;align-items:center;gap:var(--s-3);padding:2px 10px 2px 3px;border-radius:999px;background:var(--paper-2);color:var(--ink);font-size:var(--fs-sm);max-width:200px;}
#tadori-root .tdr-user-avatar{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-weight:600;font-size:12px;flex-shrink:0;}
#tadori-root .tdr-user-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tadori-root .tdr-presence{display:flex;align-items:center;gap:var(--s-2);padding:4px 10px;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-2);font-size:var(--fs-xs);color:var(--ink-3);cursor:default;white-space:nowrap;}
#tadori-root .tdr-presence .ic{font-size:12px;line-height:1;}
#tadori-root .tdr-presence .cnt{font-weight:600;color:var(--ink);}
#tadori-root .tdr-presence .sep{color:var(--ink-4);}
#tadori-root .tdr-presence .writer.is-me{color:var(--accent-strong);font-weight:600;}

/* \u30EC\u30A4\u30A2\u30A6\u30C8: \u5DE6\u30DA\u30A4\u30F3 | \u4ED5\u5207\u308A | \u30C1\u30E3\u30C3\u30C8 */
#tadori-root .tdr-main{display:flex;flex:1;min-height:0;}
#tadori-root .tdr-chat{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;}
#tadori-root .tdr-sidebar{flex:0 0 auto;display:flex;flex-direction:column;min-height:0;
  background:var(--paper-2);border-right:1px solid var(--line);overflow:hidden;}
#tadori-root .tdr-sidebar-head{display:flex;align-items:stretch;gap:var(--s-3);margin:var(--s-5);}
#tadori-root .tdr-sidebar-head .tdr-new-session{flex:1;margin:0;}
#tadori-root .tdr-new-session{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:var(--s-3);
  margin:var(--s-5);padding:var(--s-4) var(--s-5);font:inherit;font-size:var(--fs-md);font-weight:600;color:#fff;
  background:var(--accent);border:1px solid var(--accent);border-radius:var(--r-3);cursor:pointer;}
#tadori-root .tdr-new-session:hover{background:var(--accent-strong);border-color:var(--accent-strong);color:#fff;}
#tadori-root .tdr-search-btn{flex:0 0 auto;width:38px;display:inline-flex;align-items:center;justify-content:center;
  background:var(--paper-2);border:1px solid var(--line-strong);border-radius:var(--r-3);color:var(--ink-3);cursor:pointer;}
#tadori-root .tdr-search-btn:hover{color:var(--accent-strong);border-color:var(--accent-strong);background:var(--accent-soft);}
#tadori-root .tdr-session-list{flex:1;min-height:0;overflow-y:auto;padding:0 var(--s-3) var(--s-5);display:flex;flex-direction:column;gap:2px;}
#tadori-root .tdr-session-empty{padding:var(--s-5);font-size:var(--fs-sm);color:var(--ink-4);text-align:center;}
#tadori-root .tdr-session{display:flex;align-items:center;gap:var(--s-3);padding:var(--s-4);border-radius:var(--r-3);
  cursor:pointer;color:var(--ink);position:relative;}
#tadori-root .tdr-session:hover{background:var(--paper-3);}
#tadori-root .tdr-session.is-active{background:var(--accent-soft);color:var(--accent-strong);}
#tadori-root .tdr-session-ic{flex:0 0 auto;color:var(--ink-4);display:inline-flex;}
#tadori-root .tdr-session.is-active .tdr-session-ic{color:var(--accent-strong);}
#tadori-root .tdr-session-title{flex:1;min-width:0;font-size:var(--fs-md);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#tadori-root .tdr-session-del,#tadori-root .tdr-session-edit{flex:0 0 auto;display:none;align-items:center;justify-content:center;width:22px;height:22px;
  padding:0;border:none;background:transparent;color:var(--ink-4);border-radius:var(--r-1);cursor:pointer;}
#tadori-root .tdr-session:hover .tdr-session-del,#tadori-root .tdr-session:hover .tdr-session-edit{display:inline-flex;}
#tadori-root .tdr-session-del:hover{color:var(--danger);background:var(--danger-soft);}
#tadori-root .tdr-session-edit:hover{color:var(--accent-strong);background:var(--accent-soft);}
#tadori-root .tdr-session-edit-input{flex:1;min-width:0;font:inherit;font-size:var(--fs-md);color:var(--ink);background:var(--paper);border:1px solid var(--accent);border-radius:var(--r-1);padding:2px 6px;outline:none;}
#tadori-root .tdr-divider{flex:0 0 5px;cursor:col-resize;background:transparent;position:relative;}
#tadori-root .tdr-divider::after{content:"";position:absolute;inset:0 2px;background:var(--line);transition:background .12s;}
#tadori-root .tdr-divider:hover::after,#tadori-root .tdr-divider.is-dragging::after{background:var(--accent-strong);}

#tadori-root .tdr-progress{margin-top:var(--s-4);height:6px;background:var(--paper-3);border-radius:999px;overflow:hidden;}
#tadori-root .tdr-progress-fill{height:100%;width:0;background:var(--accent);border-radius:999px;transition:width .2s ease;}

#tadori-root .tdr-thread{flex:1;min-height:0;overflow:auto;padding:var(--gutter) var(--gutter) var(--s-7);}
#tadori-root .tdr-turn{max-width:var(--thread-w);margin:0 auto var(--s-9);}
#tadori-root .tdr-q{margin-left:auto;max-width:80%;width:fit-content;background:var(--accent-soft);
  color:var(--ink);padding:var(--s-4) var(--s-5);border-radius:var(--r-4) var(--r-4) var(--r-1) var(--r-4);font-size:var(--fs-base);}
#tadori-root .tdr-a{display:flex;gap:var(--s-4);margin-top:var(--s-6);}
#tadori-root .tdr-a-avatar{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:var(--accent-soft);
  color:var(--accent-strong);font-family:var(--font-mono);font-size:var(--fs-base);display:flex;align-items:center;justify-content:center;}
#tadori-root .tdr-a-body{flex:1;min-width:0;}
#tadori-root .tdr-answer{font-size:var(--fs-base);color:var(--ink);line-height:1.85;}
#tadori-root .tdr-thinking{display:inline-flex;align-items:center;color:var(--ink-3);font-size:var(--fs-base);}
#tadori-root .tdr-thinking .tdr-dot{display:inline-block;width:4px;height:4px;margin-left:4px;border-radius:50%;background:var(--accent-strong);animation:tdr-bounce 1.2s infinite ease-in-out;}
#tadori-root .tdr-thinking .tdr-dot:nth-of-type(2){animation-delay:.18s;}
#tadori-root .tdr-thinking .tdr-dot:nth-of-type(3){animation-delay:.36s;}
@keyframes tdr-bounce{0%,80%,100%{opacity:.25;transform:translateY(0);}40%{opacity:1;transform:translateY(-2px);}}
/* Markdown \u30EC\u30F3\u30C0\u30EA\u30F3\u30B0 (AI \u56DE\u7B54) */
#tadori-root .tdr-answer p{margin:0 0 var(--s-4);}
#tadori-root .tdr-answer p:last-child{margin-bottom:0;}
#tadori-root .tdr-answer h1,#tadori-root .tdr-answer h2,#tadori-root .tdr-answer h3,#tadori-root .tdr-answer h4{margin:var(--s-6) 0 var(--s-3);font-weight:600;line-height:1.4;}
#tadori-root .tdr-answer h1{font-size:var(--fs-xl);}
#tadori-root .tdr-answer h2{font-size:var(--fs-lg);}
#tadori-root .tdr-answer h3,#tadori-root .tdr-answer h4{font-size:var(--fs-base);}
#tadori-root .tdr-answer ul,#tadori-root .tdr-answer ol{margin:0 0 var(--s-4);padding-left:1.5em;}
#tadori-root .tdr-answer li{margin:var(--s-1) 0;}
#tadori-root .tdr-answer blockquote{margin:0 0 var(--s-4);padding:var(--s-2) var(--s-5);border-left:3px solid var(--line-strong);color:var(--ink-3);}
#tadori-root .tdr-answer code{font-family:var(--font-mono);font-size:.9em;background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-1);padding:1px 5px;}
#tadori-root .tdr-answer pre{margin:0 0 var(--s-4);padding:var(--s-4) var(--s-5);background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-3);overflow:auto;}
#tadori-root .tdr-answer pre code{background:none;border:none;padding:0;font-size:var(--fs-sm);line-height:1.6;}
#tadori-root .tdr-answer a{color:var(--accent-strong);text-decoration:underline;}
#tadori-root .tdr-answer hr{border:none;border-top:1px solid var(--line);margin:var(--s-5) 0;}
#tadori-root .tdr-answer strong{font-weight:600;}
#tadori-root .tdr-answer .cite{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--accent-strong);
  background:var(--accent-soft);border-radius:var(--r-1);padding:0 4px;margin:0 1px;cursor:pointer;vertical-align:1px;}
#tadori-root .tdr-a-meta{display:flex;align-items:center;gap:var(--s-4);margin:var(--s-4) 0 var(--s-3);font-size:var(--fs-sm);color:var(--ink-3);}
#tadori-root .tdr-turn-time{font-family:var(--font-mono);color:var(--ink-4);}
#tadori-root .tdr-a-meta .mono,#tadori-root .tdr-q .mono{font-family:var(--font-mono);}
#tadori-root .tdr-sources-h{display:flex;align-items:center;gap:var(--s-3);margin:var(--s-6) 0 var(--s-3);font-size:var(--fs-sm);color:var(--ink-3);cursor:pointer;}
#tadori-root .tdr-sources-h svg{transition:transform .15s;}
#tadori-root .tdr-sources-h.collapsed svg{transform:rotate(-90deg);}
#tadori-root .tdr-sources.collapsed{display:none;}
#tadori-root .tdr-hit{padding:var(--s-5);border:1px solid var(--line);border-radius:var(--r-3);margin-bottom:var(--s-3);cursor:pointer;background:var(--paper);}
#tadori-root .tdr-hit:hover{background:var(--paper-2);border-color:var(--line-strong);}
#tadori-root .tdr-hit.is-open{background:var(--paper-2);border-color:var(--line-strong);}
#tadori-root .tdr-hit-head{display:flex;align-items:center;gap:var(--s-3);}
#tadori-root .tdr-hit-num{flex:0 0 auto;font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--accent-strong);background:var(--accent-soft);width:20px;height:20px;border-radius:var(--r-1);display:inline-flex;align-items:center;justify-content:center;}
#tadori-root .tdr-hit-badge{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;color:var(--ink-3);}
#tadori-root .tdr-hit--onenote .tdr-hit-badge{color:#8a4a9e;}
#tadori-root .tdr-hit--doc .tdr-hit-badge{color:#3a6ea5;}
#tadori-root .tdr-hit-subject{font-size:var(--fs-base);font-weight:600;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tadori-root .tdr-hit-score{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--accent-strong);background:var(--accent-soft);padding:2px 6px;border-radius:var(--r-1);flex:0 0 auto;}
#tadori-root .tdr-hit-open{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;padding:0;border:1px solid var(--line);border-radius:var(--r-1);background:transparent;color:var(--ink-3);cursor:pointer;}
#tadori-root .tdr-hit-open:hover{color:var(--accent-strong);border-color:var(--accent-strong);background:var(--accent-soft);}
#tadori-root .tdr-hit-open:disabled{opacity:.5;cursor:default;}
#tadori-root .tdr-hit-from{font-size:var(--fs-sm);color:var(--ink-3);margin-top:var(--s-1);}
#tadori-root .tdr-hit-snippet{font-size:var(--fs-md);color:var(--ink);margin-top:var(--s-2);line-height:1.6;}
#tadori-root .tdr-hit mark,#tadori-root .tdr-hit-snippet mark{background:var(--hl);color:inherit;border-radius:2px;padding:0 1px;}
#tadori-root .tdr-hit-detail{margin-top:var(--s-5);padding-top:var(--s-5);border-top:1px solid var(--line);font-size:var(--fs-md);color:var(--ink);line-height:1.8;}
#tadori-root .tdr-hit-detail-body{margin-top:var(--s-4);}
#tadori-root .tdr-hit-more{display:inline-flex;align-items:center;gap:var(--s-2);margin-top:var(--s-4);padding:4px 10px;font:inherit;font-size:var(--fs-xs);color:var(--ink-3);background:transparent;border:1px solid var(--line);border-radius:var(--r-2);cursor:pointer;}
#tadori-root .tdr-hit-more:hover{color:var(--ink);background:var(--paper-2);border-color:var(--line-strong);}
#tadori-root .tdr-hit-more .ic{display:inline-flex;transition:transform .15s;}
#tadori-root .tdr-hit-more.is-open .ic{transform:rotate(180deg);}
#tadori-root .tdr-hit-body-tail{margin-top:var(--s-3);padding-top:var(--s-3);border-top:1px dashed var(--line);color:var(--ink-3);}
#tadori-root .tdr-hit-hdr{display:grid;grid-template-columns:max-content 1fr;gap:var(--s-2) var(--s-4);font-size:var(--fs-sm);color:var(--ink);padding:var(--s-3) var(--s-4);background:var(--paper-2);border-radius:var(--r-2);border:1px solid var(--line);}
#tadori-root .tdr-hit-hdr-row{display:contents;}
#tadori-root .tdr-hit-hdr-label{color:var(--ink-3);font-weight:600;white-space:nowrap;}
#tadori-root .tdr-hit-hdr-value{color:var(--ink);word-break:break-all;}
#tadori-root .tdr-empty{max-width:var(--thread-w);margin:10vh auto 0;text-align:center;color:var(--ink-3);}
#tadori-root .tdr-empty .big{font-size:var(--fs-xl);color:var(--ink);margin-bottom:var(--s-3);}

#tadori-root .tdr-composer{flex:0 0 auto;border-top:1px solid var(--line);background:var(--paper);padding:var(--s-5) var(--gutter) var(--s-7);}
#tadori-root .tdr-composer-inner{max-width:var(--thread-w);margin:0 auto;}
#tadori-root .tdr-composer-inner .tdr-note-form,#tadori-root .tdr-composer-inner .tdr-note-hint{max-width:none;margin-left:0;margin-right:0;}
#tadori-root .tdr-model-pick{display:block;max-width:240px;margin:0 0 var(--s-3);padding:3px 8px;font-size:var(--fs-xs);font-family:inherit;background:transparent;color:var(--ink-3);border:1px solid var(--line-strong);border-radius:var(--r-2);outline:none;cursor:pointer;}
#tadori-root .tdr-model-pick:hover{color:var(--ink);border-color:var(--ink-4);}
#tadori-root .tdr-turn-actions{display:flex;align-items:center;gap:var(--s-3);margin-top:var(--s-4);}
#tadori-root .tdr-turn-cost{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--ink-4);}
#tadori-root .tdr-copy{display:inline-flex;align-items:center;gap:var(--s-2);padding:3px 9px;font-size:var(--fs-xs);font-family:inherit;color:var(--ink-3);background:transparent;border:1px solid var(--line);border-radius:var(--r-2);cursor:pointer;}
#tadori-root .tdr-copy:hover{color:var(--ink);background:var(--paper-2);border-color:var(--line-strong);}
#tadori-root .tdr-copy.is-done{color:var(--ok);border-color:var(--ok);}
#tadori-root .tdr-copy .ic{display:inline-flex;}
#tadori-root .tdr-note-form{position:relative;line-height:0;max-width:var(--thread-w);margin:0 auto;}
#tadori-root .tdr-note-input{width:100%;min-height:48px;max-height:40vh;padding:14px 60px 14px 16px;resize:none;font-family:inherit;font-size:var(--fs-base);line-height:1.6;color:var(--ink);background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-3);outline:none;}
#tadori-root .tdr-note-input:focus{background:var(--paper);border-color:var(--line-strong);}
#tadori-root .tdr-note-input::placeholder{color:var(--ink-4);}
#tadori-root .tdr-note-submit{position:absolute;right:22px;bottom:11px;width:26px;height:26px;border:none;background:var(--accent);color:#fff;border-radius:var(--r-2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
#tadori-root .tdr-note-submit:hover{background:var(--accent-strong);}
#tadori-root .tdr-note-submit:disabled{opacity:.4;cursor:default;}
#tadori-root .tdr-note-submit.is-stop{background:var(--danger);}
#tadori-root .tdr-note-submit.is-stop:hover{filter:brightness(.93);}
/* \u51FA\u5178\u30AB\u30FC\u30C9\u306E\u30B8\u30E3\u30F3\u30D7\u6642\u30CF\u30A4\u30E9\u30A4\u30C8 */
#tadori-root .tdr-hit.is-flash{animation:tdr-flash 1.2s ease-out;}
@keyframes tdr-flash{0%{background:var(--accent-soft);border-color:var(--accent-strong);}100%{background:var(--paper);}}
/* \u5B9A\u578B\u30C1\u30C3\u30D7 / \u8CEA\u554F\u30B5\u30B8\u30A7\u30B9\u30C8 */
#tadori-root .tdr-chips{display:flex;flex-wrap:wrap;gap:var(--s-2);margin-bottom:var(--s-3);}
